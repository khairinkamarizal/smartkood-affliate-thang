    - code [ref=f1e120]: "Create a mobile-first affiliate share flow as an iPhone-style bottom sheet. Visual direction: vibrant Apple-inspired commerce: crisp, minimal, high-chroma, and never cartoonish or generic AI. Use solid Apple blue #0071e3 for actions, vivid coral #ff3b6b for earned-value emphasis, and controlled cyan #5ac8fa and tangerine #ff9f0a accents. Surfaces are clean white or cool gray, borders are 1px, and shadows are soft. Use Roboto everywhere with a strict optical hierarchy: display headlines and controls at 600, labels at 500–600, and body copy at 400. Never exceed font-weight 600; create hierarchy through scale, spacing, and color. Use a deliberate 4px spacing base with primary gaps of 8, 12, 16, 20, 24, 32, and 48px. Keep gradients limited to thin spectrum rails and diffused background light. Never use gradient buttons, purple wash, glassmorphism overload, thick black outlines, or floating blobs. Support initial, submitting, success, rate-limited, and revoked states. Submitting uses an Apple-blue button at 72% opacity with a spinner and no hover. Rate-limited uses a flat neutral-gray disabled button with no shadow. In success, show sharing platforms in a horizontal rail with a visible right-edge arrow and fade so overflow is discoverable; the arrow scrolls the rail and remains keyboard accessible. Keep labels associated, announce copy success with aria-live, and keep the sheet anchored to the bottom with a 28px top radius."
